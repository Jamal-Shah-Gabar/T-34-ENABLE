<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENABLE AccessiBot – Evidence-led Testing Tool</title>

<body>

<a href="#chat-input" class="skip-link">Skip to chat input</a>

  <div class="app-shell" role="main">

```
<!-- ── SIDEBAR ── -->
<aside class="sidebar" aria-label="Accessibility Controls">
  <div class="sidebar-brand">
    <span class="brand-icon" aria-hidden="true">◈</span>
    <span class="brand-name">ENABLE AccessiBot</span>
  </div>

  <section class="control-group">
    <h2 class="group-title">👁 Vision</h2>
    <button class="ctrl-btn" id="btn-zoom-in">A+ Larger Text</button>
    <button class="ctrl-btn" id="btn-zoom-out">A− Smaller Text</button>
    <button class="ctrl-btn" id="btn-contrast">⬛ High Contrast</button>
    <button class="ctrl-btn" id="btn-dyslexia">Aa Dyslexia Font</button>
  </section>

  <section class="control-group">
    <h2 class="group-title">🔊 Hearing</h2>
    <button class="ctrl-btn" id="btn-tts">▶ Read Aloud</button>
    <button class="ctrl-btn" id="btn-captions">CC Captions</button>
    <label for="speed-select">Speech Speed</label>
    <select id="speed-select">
      <option value="0.75">Slow</option>
      <option value="1" selected>Normal</option>
      <option value="1.5">Fast</option>
    </select>
  </section>

  <section class="control-group">
    <h2 class="group-title">🖱 Motor</h2>
    <button class="ctrl-btn" id="btn-stt">🎙 Voice Input</button>
    <button class="ctrl-btn" id="btn-focus">🎯 Focus Mode</button>
  </section>

  <div class="sidebar-footer">
    <button class="ctrl-btn danger" id="btn-clear">🗑 Clear Chat</button>
  </div>
</aside>

<!-- ── CHAT PANEL ── -->
<div class="chat-panel">

  <header class="chat-header">
    <div>
      <span id="status-text">ENABLE AccessiBot</span>
    </div>
    <span class="tag">Evidence-led Testing</span>
  </header>

  <!-- Session Bar -->
  <div class="session-bar">
    <div class="session-grid">

      <select id="role-select">
        <option value="Student" selected>Student</option>
        <option value="Teaching Staff">Teaching Staff</option>
        <option value="IT Staff">IT Staff</option>
      </select>

      <select id="system-select">
        <option value="UoB Intranet" selected>UoB Intranet</option>
        <option value="UoB Website">UoB Website</option>
      </select>

      <select id="scenario-select">
        <option value="S1" selected>S1</option>
        <option value="S2">S2</option>
        <option value="S3">S3</option>
        <option value="S4">S4</option>
      </select>

      <button id="btn-start">▶ Start</button>
      <button id="btn-finish">✓ Finish</button>
      <button id="btn-report">⚑ Report</button>
      <button id="btn-export">⬇ Export</button>

    </div>

    <div>
      <span id="timer-text">Not started</span> •
      <span id="backend-text">Checking…</span>
    </div>
  </div>

  <!-- Messages -->
  <div id="chat-messages" class="chat-messages">
    <div class="message bot">
      <div class="bubble">
        <p><strong>Hi 👋</strong> I’m ENABLE AccessiBot.</p>
        <p>Click <strong>Start</strong> and begin your accessibility test.</p>
      </div>
    </div>
  </div>

  <div id="caption-bar" hidden></div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea id="chat-input" placeholder="Type your message…"></textarea>
    <button id="btn-send">Send</button>
  </div>

</div>
```

  </div>

  <!-- Modal -->

  <div id="modal-backdrop" hidden></div>

  <div id="issue-modal" hidden>
    <h2>Report Issue</h2>

```
<input id="issue-url" placeholder="URL" />
<select id="issue-category">
  <option>Vision</option>
  <option>Hearing</option>
  <option>Motor</option>
  <option>Neurodiversity</option>
</select>

<select id="issue-severity">
  <option>Minor</option>
  <option>Major</option>
  <option>Blocker</option>
</select>

<textarea id="issue-what" placeholder="What happened?"></textarea>
<textarea id="issue-expected" placeholder="Expected?"></textarea>
<textarea id="issue-suggestion" placeholder="Suggestion"></textarea>

<button id="btn-submit-issue">Submit</button>
<button id="btn-close-modal">Close</button>
```

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
